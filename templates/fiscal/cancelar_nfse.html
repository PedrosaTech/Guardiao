{% extends 'base.html' %}

{% block title %}Cancelar NFS-e{% endblock %}
{% block page_title %}Cancelar NFS-e RPS {{ nota.numero_rps }}{% endblock %}

{% block content %}
<div class="container-fluid" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Motivo do cancelamento</label>
            <textarea name="motivo" class="form-control" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-danger">Confirmar cancelamento</button>
        <a href="{% url 'fiscal:detalhes_nfse' nota.id %}" class="btn btn-secondary">Voltar</a>
    </form>
</div>
{% endblock %}
