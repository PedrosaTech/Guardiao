{% extends 'base.html' %}

{% block title %}Cancelar NFC-e{% endblock %}
{% block page_title %}Cancelar NFC-e {{ nota.numero }}/{{ nota.serie }}{% endblock %}

{% block content %}
<div class="container-fluid" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Justificativa (mín. 15 caracteres)</label>
            <textarea name="justificativa" class="form-control" rows="4" required minlength="15"></textarea>
        </div>
        <button type="submit" class="btn btn-danger">Confirmar cancelamento</button>
        <a href="{% url 'fiscal:detalhes_nfce' nota.id %}" class="btn btn-secondary">Voltar</a>
    </form>
</div>
{% endblock %}
