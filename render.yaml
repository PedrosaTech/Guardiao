# Render Blueprint: Guardião (Django + PostgreSQL)
# https://docs.render.com/blueprint-spec

databases:
  - name: guardiao-guardiao-db
    plan: free

services:
  - type: web
    name: guardiao-guardiao
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: python manage.py migrate --no-input && python manage.py load_initial_data && gunicorn guardiao.wsgi:application

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: guardiao-guardiao-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: guardiao.settings.prod
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://guardiao-guardiao.onrender.com"
