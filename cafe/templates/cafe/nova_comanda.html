{% extends 'cafe/base_cafe.html' %}

{% block title %}Nova Comanda{% endblock %}

{% block content %}
<a href="{% url 'cafe:lista' %}" class="back-link">← Voltar</a>

<div class="card">
    <h2 style="margin-bottom:16px;font-size:1.2rem;">Abrir Comanda</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="nome_cliente">Nome do cliente *</label>
            <input type="text" id="nome_cliente" name="nome_cliente" class="form-control"
                   placeholder="Ex: Maria Silva" required autofocus>
        </div>
        <div class="form-group">
            <label for="cpf_cliente">CPF (opcional)</label>
            <input type="text" id="cpf_cliente" name="cpf_cliente" class="form-control"
                   placeholder="000.000.000-00" maxlength="14">
        </div>
        <button type="submit" class="btn btn-primary">Abrir Comanda</button>
    </form>
</div>
{% endblock %}
