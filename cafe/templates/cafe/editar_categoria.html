{% extends 'cafe/base_cafe.html' %}

{% block title %}Editar Categoria{% endblock %}

{% block content %}
<a href="{% url 'cafe:cardapio' %}" class="back-link">← Cardápio</a>

<div class="card">
    <h2 style="margin-bottom:16px;">Editar Categoria</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="nome">Nome *</label>
            <input type="text" id="nome" name="nome" class="form-control" required
                   value="{{ categoria.nome }}">
        </div>
        <div class="form-group">
            <label for="icone">Ícone (emoji)</label>
            <input type="text" id="icone" name="icone" class="form-control"
                   value="{{ categoria.icone }}" maxlength="10">
        </div>
        <div class="form-group">
            <label for="ordem">Ordem de exibição</label>
            <input type="number" id="ordem" name="ordem" class="form-control"
                   value="{{ categoria.ordem }}" min="0">
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
    </form>
</div>
{% endblock %}
